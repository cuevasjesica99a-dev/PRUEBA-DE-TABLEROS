<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard +MARKA | Banco Familiar</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#f4f6f9; }
header { background:#0033a0; color:white; padding:15px; }
.card { border:none; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,.08); }
.kpi { font-size:24px; font-weight:bold; }
.thumb { width:55px; border-radius:6px; cursor:pointer; margin:2px; }
.loader { display:none; text-align:center; font-size:20px; }
</style>
</head>

<body>

<header class="text-center">
<h3>Dashboard Relevamiento Gastro Interior</h3>
<small>+MARKA | Banco Familiar</small>
</header>

<div class="container mt-3">

<div class="d-flex justify-content-between mb-3">
<button class="btn btn-primary" onclick="cargarTodo()">Actualizar</button>
<button class="btn btn-success" onclick="exportCSV()">Exportar CSV</button>
<div id="lastUpdate"></div>
</div>

<div class="loader" id="loader">Cargando datos...</div>

<!-- FILTROS -->
<div class="card p-3 mb-3">
<div class="row">
<div class="col"><select id="fCiudad" class="form-select"></select></div>
<div class="col"><select id="fTipo" class="form-select"></select></div>
<div class="col"><input type="date" id="fDesde" class="form-control"></div>
<div class="col"><input type="date" id="fHasta" class="form-control"></div>
<div class="col"><input type="text" id="buscador" placeholder="Buscar..." class="form-control"></div>
</div>
</div>

<ul class="nav nav-tabs">
<li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#gastro">Gastro</button></li>
<li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#comp">Competencia</button></li>
<li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tiendas">Tiendas</button></li>
</ul>

<div class="tab-content mt-3">

<!-- GASTRO -->
<div class="tab-pane fade show active" id="gastro">
<div class="row text-center" id="kpis"></div>

<div class="row mt-3">
<div class="col-md-6"><canvas id="cCiudad"></canvas></div>
<div class="col-md-6"><canvas id="cEstado"></canvas></div>
</div>

<table class="table table-sm mt-3" id="tabla"></table>
</div>

<!-- COMPETENCIA -->
<div class="tab-pane fade" id="comp">
<canvas id="cComp"></canvas>
</div>

<!-- TIENDAS -->
<div class="tab-pane fade" id="tiendas">
<div id="tiendasBox"></div>
</div>

</div>
</div>

<!-- MODAL -->
<div class="modal fade" id="modalImg">
<div class="modal-dialog modal-lg">
<div class="modal-content">
<img id="imgBig" class="w-100">
</div>
</div>
</div>

<script>
const BASE="https://opensheet.elk.sh/2PACX-1vR1Y4H9iM_EqiFOBOEU2SRERaH0KfH3dTfdy0DsFTBhBkWeaaaqlmCFwqip1gy010JR9iQn9TZzM06V";

let gastro=[],comp=[],tiendas=[];

function norm(v){ return (v||"").toUpperCase(); }

async function cargarTodo(){
loader.style.display="block";

[gastro,comp,tiendas]=await Promise.all([
fetch(BASE+"/RE_BF_GASTRO_INT").then(r=>r.json()),
fetch(BASE+"/RE_COMPE_GASTRO_INT").then(r=>r.json()),
fetch(BASE+"/RE_BF_TIENDAS").then(r=>r.json())
]);

loader.style.display="none";
lastUpdate.innerText="Actualizado: "+new Date().toLocaleString();

initFiltros();
renderAll();
}

function initFiltros(){
let ciudades=[...new Set(gastro.map(x=>x.CIUDAD).filter(Boolean))];
let tipos=[...new Set(gastro.map(x=>x.TIPO_LOCAL).filter(Boolean))];

fCiudad.innerHTML='<option value="">Ciudad</option>'+ciudades.map(x=>`<option>${x}</option>`).join('');
fTipo.innerHTML='<option value="">Tipo</option>'+tipos.map(x=>`<option>${x}</option>`).join('');

[fCiudad,fTipo,fDesde,fHasta,buscador].forEach(el=>el.oninput=renderAll);
}

function filtrar(){
return gastro.filter(x=>{
if(fCiudad.value && x.CIUDAD!=fCiudad.value) return false;
if(fTipo.value && x.TIPO_LOCAL!=fTipo.value) return false;
if(fDesde.value && x.FECHA<fDesde.value) return false;
if(fHasta.value && x.FECHA>fHasta.value) return false;

let texto = (x.LOCAL + x.CIUDAD).toLowerCase();
if(buscador.value && !texto.includes(buscador.value.toLowerCase())) return false;

return true;
});
}

function renderAll(){
let d=filtrar();
renderKPIs(d);
renderTabla(d);
renderCharts(d);
renderComp();
renderTiendas();
}

function calc(d,c){
let t=d.length;
let ok=d.filter(x=>norm(x[c])==="SI").length;
return t?((ok/t)*100).toFixed(1):0;
}

function renderKPIs(d){
kpis.innerHTML=`
<div class="col card m-1 p-2"><div>Total</div><div class="kpi">${d.length}</div></div>
<div class="col card m-1 p-2"><div>% Material</div><div class="kpi">${calc(d,'HAY_MATERIAL_DESIGNADO')}%</div></div>
<div class="col card m-1 p-2"><div>% Correcto</div><div class="kpi">${calc(d,'MATERIAL_CORRESPONDE_TIPO')}%</div></div>
<div class="col card m-1 p-2"><div>% Beneficio</div><div class="kpi">${calc(d,'BENEFICIO_EXHIBIDO')}%</div></div>
<div class="col card m-1 p-2"><div>% Oferta OK</div><div class="kpi">${calc(d,'OFERTA_EXHIBIDA_CORRECTA')}%</div></div>
`;
}

function renderTabla(d){
let html="<tr><th>Fecha</th><th>Local</th><th>Ciudad</th><th>Fotos</th></tr>";

d.forEach(x=>{
html+=`<tr>
<td>${x.FECHA}</td>
<td>${x.LOCAL}</td>
<td>${x.CIUDAD}</td>
<td>
${img(x.FOTO_MATERIAL_1)}
${img(x.FOTO_MATERIAL_2)}
${img(x.FOTO_MATERIAL_3)}
${img(x.FOTO_AUSENCIA)}
${img(x.FOTO_ANTERIOR_1)}
</td>
</tr>`;
});

tabla.innerHTML=html;
}

function img(u){
if(!u) return "";
return `<img src="${u}" class="thumb" onclick="ver('${u}')">`;
}

function ver(u){
imgBig.src=u;
new bootstrap.Modal(modalImg).show();
}

function renderCharts(d){
let c={}, e={};

d.forEach(x=>{
c[x.CIUDAD]=(c[x.CIUDAD]||0)+1;
e[x.ESTADO_MATERIAL]=(e[x.ESTADO_MATERIAL]||0)+1;
});

new Chart(cCiudad,{type:'bar',data:{labels:Object.keys(c),datasets:[{data:Object.values(c)}]}});

new Chart(cEstado,{type:'pie',data:{labels:Object.keys(e),datasets:[{data:Object.values(e)}]}});

let compData={};
comp.forEach(x=>{
compData[x.HAY_MATERIAL_COMPETENCIA]=(compData[x.HAY_MATERIAL_COMPETENCIA]||0)+1;
});
new Chart(cComp,{type:'doughnut',data:{labels:Object.keys(compData),datasets:[{data:Object.values(compData)}]}});
}

function renderComp(){}

function renderTiendas(){
tiendasBox.innerHTML="<b>Registros:</b> "+tiendas.length;
}

function exportCSV(){
let d=filtrar();
let csv="FECHA,LOCAL,CIUDAD\n";
d.forEach(x=>csv+=`${x.FECHA},${x.LOCAL},${x.CIUDAD}\n`);
let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="datos.csv";
a.click();
}

cargarTodo();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
